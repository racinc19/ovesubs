<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>OVE subs — Schedule</title>
<style>
:root{--bg:#0c1220;--card:#141e30;--card2:#1a2640;--hover:#1e2d4a;--bdr:#2a3a55;--bdr2:#354766;--txt:#e8edf5;--txt2:#8899b0;--dim:#5a6d85;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f59e0b;--cyan:#06b6d4;--purple:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-y:scroll}
body{padding-top:56px;font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.5;overflow-x:hidden}
.topnav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow-on{0%,100%{box-shadow:0 0 20px rgba(34,197,94,.2)}50%{box-shadow:0 0 40px rgba(34,197,94,.45)}}
@keyframes glow-off{0%,100%{box-shadow:0 0 20px rgba(239,68,68,.25)}50%{box-shadow:0 0 44px rgba(239,68,68,.55)}}
@keyframes badge-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(1.04)}}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px}
.spinner{width:48px;height:48px;border:4px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
#loading .msg{color:var(--txt2);font-size:14px}
#error{display:none;text-align:center;padding:80px 20px;color:var(--red)}
#app{display:none}
.btn{padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;border:none;cursor:pointer;color:white}
.btn-blue{background:var(--blue)}
.topnav{position:fixed;top:0;left:0;width:100vw;z-index:50;background:var(--card);border-bottom:1px solid var(--bdr);padding:0 20px}
.topnav-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:flex-start;height:56px;gap:8px;position:relative;min-width:0}
.topnav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-weight:700;font-size:16px;white-space:nowrap;flex:0 0 auto;min-width:0}
.topnav-links{flex:1 1 auto;min-width:0;display:flex;gap:4px;align-items:center;justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;overscroll-behavior-x:contain}
.topnav-links::-webkit-scrollbar{display:none}
.topnav-links a{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--txt2);text-decoration:none;transition:all .2s;white-space:nowrap;flex-shrink:0}
.topnav-links a:hover{color:var(--txt);background:var(--hover)}
.topnav-links a.active{color:white;background:var(--blue)}
.topnav-refresh{flex:0 0 auto;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:none;color:var(--txt2);cursor:pointer;transition:all .2s;white-space:nowrap}
.topnav-refresh:hover{border-color:var(--blue);color:var(--txt)}

.hero-wrap{max-width:1600px;margin:0 auto;padding:16px 20px 0}
.hero{border-radius:14px;padding:0;display:flex;flex-direction:column;align-items:stretch;position:relative;overflow:hidden;border:1px solid transparent}
.hero.no-sub{padding:18px 24px}
.hero.on-time{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(6,182,212,.04));border-color:rgba(34,197,94,.25);animation:glow-on 3s ease-in-out infinite}
.hero.off-time{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(245,158,11,.05));border-color:rgba(239,68,68,.3);animation:glow-off 3s ease-in-out infinite}
.hero.no-sub{background:var(--card);border-color:var(--bdr)}
.hero-row-primary{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:18px 24px}
.hero-right-col{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.hero-substack{border-top:1px solid rgba(42,58,85,.55);background:rgba(0,0,0,.12)}
.hero-row-sub{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 24px;flex-wrap:wrap}
.hero-row-sub+.hero-row-sub{border-top:1px solid rgba(42,58,85,.25)}
.hero-sub-left{display:flex;flex-direction:column;gap:2px;min-width:140px}
.hero-sub-name{font-size:15px;font-weight:700;color:var(--txt)}
.hero-sub-vendor{font-size:11px;color:var(--txt2)}
.hero-sub-mid{display:flex;align-items:center;gap:14px}
.hero-sub-pct{font-size:18px;font-weight:800}
.hero-row-sub.on-time .hero-sub-pct{color:var(--green)}
.hero-row-sub.off-time .hero-sub-pct{color:var(--red)}
.hero-sub-days{font-size:13px;font-weight:700;color:var(--txt)}
.hero-sub-prog{display:flex;align-items:center;gap:8px}
.hero-prog-bar-sm{width:100px;height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.hero-sub-pct-lbl{font-size:11px;font-weight:700;color:var(--dim)}
.hero-row-sub.on-time .hero-prog-fill{background:var(--green)}
.hero-row-sub.off-time .hero-prog-fill{background:var(--red)}
.hero-left{display:flex;align-items:center;gap:14px}
.hero-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.on-time .hero-icon{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25)}
.off-time .hero-icon{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3)}
.hero-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px}
.on-time .hero-label{color:var(--green)}
.off-time .hero-label{color:var(--red)}
.no-sub .hero-label{color:var(--dim)}
.hero-name{font-size:20px;font-weight:800;color:#fff;line-height:1.1}
.hero-vendor{font-size:12px;color:var(--txt2);margin-top:3px}
.hero-center{display:flex;gap:20px;align-items:center}
.hero-stat{text-align:center}
.hero-stat-val{font-size:22px;font-weight:800;line-height:1}
.hero-stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-top:2px}
.on-time .hero-center>.hero-stat .hero-stat-val:not(.hero-stat-sched){color:var(--green)}
.off-time .hero-center>.hero-stat .hero-stat-val:not(.hero-stat-sched){color:var(--red)}
.hero-stat-val.hero-stat-sched{color:var(--txt);font-size:16px;font-weight:800}
.hero-div{width:1px;height:36px;background:var(--bdr)}
.hero-badge{padding:7px 16px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;animation:badge-pulse 2s ease-in-out infinite}
.on-time .hero-badge{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.35)}
.off-time .hero-badge{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.35)}
.hero-prog-wrap{display:flex;align-items:center;gap:8px}
.hero-prog-bar{width:120px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.hero-prog-fill{height:100%;border-radius:3px}
.on-time .hero-prog-fill{background:var(--green)}
.off-time .hero-prog-fill{background:var(--red)}
.hero-prog-pct{font-size:12px;font-weight:700}
.on-time .hero-prog-pct{color:var(--green)}
.off-time .hero-prog-pct{color:var(--red)}
.gantt-phase-tracker{max-width:1600px;margin:0 auto;padding:0 20px 8px}
.phase-steps{background:var(--card);border-radius:12px;padding:16px 20px;border:1px solid var(--bdr);margin-top:12px}
.phase-steps-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:14px}
.phase-steps-row{display:flex;gap:4px;align-items:center}
.phase-step{flex:1;height:6px;border-radius:3px;background:var(--bdr);transition:background .3s}
.phase-step.done{background:var(--green)}
.phase-step.active{background:var(--yellow);box-shadow:0 0 8px rgba(234,179,8,.35)}
.phase-step-all-labels{display:flex;gap:4px;margin-top:8px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.phase-step-all-label{flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-steps{background:var(--card);border-radius:12px;padding:16px 20px;border:1px solid var(--bdr);margin-top:12px}
.item-steps-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:14px}
.item-steps-row{display:flex;gap:4px;align-items:center}
.item-step{flex:1;height:6px;border-radius:3px;background:var(--bdr);transition:background .3s}
.item-step.done{background:var(--green)}
.item-step.active{background:var(--yellow)}
.item-step-all-labels{display:flex;gap:4px;margin-top:8px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.item-step-all-label{flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.gantt-outer{max-width:1600px;margin:0 auto;padding:12px 20px 24px}
.gantt-wrap{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.gantt-head{position:sticky;top:56px;z-index:20;background:var(--card2);border-bottom:2px solid var(--bdr);display:flex}
.head-label{width:250px;min-width:250px;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);border-right:1px solid var(--bdr);flex-shrink:0}
.head-months{flex:1;display:flex;overflow:hidden}
.mhdr{flex:none;text-align:center;font-size:10px;color:var(--dim);padding:8px 0;border-right:1px solid var(--bdr);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.mhdr.cur{color:var(--blue);background:rgba(59,130,246,.06)}
.gantt-body{overflow-x:auto;position:relative}
.gantt-inner{position:relative}
.g-row{display:flex;border-bottom:1px solid rgba(42,58,85,.3);transition:background .12s}
.g-row:hover{background:rgba(255,255,255,.02)}
.g-row.ph{background:rgba(59,130,246,.03)}
.g-row.act{background:rgba(245,158,11,.07);border-bottom:1px solid rgba(245,158,11,.2)}
.g-row.ov{background:rgba(239,68,68,.05);border-bottom:1px solid rgba(239,68,68,.15)}
.g-lbl{width:250px;min-width:250px;padding:0 12px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;justify-content:center;flex-shrink:0;height:34px}
.g-row.act .g-lbl{height:54px}
.g-row.ph .g-lbl{height:26px}
.g-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-row.ph .g-name{font-weight:700;color:var(--blue);font-size:12px}
.g-row.act .g-name{font-size:16px;font-weight:700;color:var(--orange)}
.g-row.ov .g-name{color:var(--red)}
.g-sub{font-size:10px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-row.act .g-sub{font-size:11px;color:var(--txt2)}
.g-tl{flex:1;position:relative;height:34px}
.g-row.act .g-tl{height:54px}
.g-row.ph .g-tl{height:26px}
.g-bar{position:absolute;top:50%;transform:translateY(-50%);height:12px;border-radius:3px;background:var(--bdr2);min-width:3px;overflow:hidden}
.g-row.ph .g-bar{height:6px;background:rgba(59,130,246,.2)}
.g-row.act .g-bar{height:20px;border-radius:5px}
.g-bar.dn{background:var(--green)}
.g-bar.ac{background:var(--orange)}
.g-bar.od{background:var(--red)}
.g-fill{position:absolute;left:0;top:0;bottom:0;border-radius:inherit}
.ac .g-fill{background:var(--green)}
.od .g-fill{background:rgba(255,255,255,.15)}
.g-delay{position:absolute;top:50%;transform:translateY(-50%);height:12px;border-radius:3px;background:rgba(239,68,68,.18);border:1px dashed rgba(239,68,68,.75);min-width:2px;pointer-events:auto;z-index:2}
.g-row.ph .g-delay{height:6px}
.g-row.act .g-delay{height:20px;border-radius:5px}
.today-mk{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:15;pointer-events:none}
.today-lbl{position:absolute;top:4px;left:4px;font-size:9px;color:var(--red);font-weight:800;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.legend{display:flex;gap:16px;padding:10px 16px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2)}
.ld{width:10px;height:10px;border-radius:2px}
</style>
</head>

<nav class="topnav"><div class="topnav-inner">
  <a href="index.html" class="topnav-brand"><span class="dot"></span>OVE subs</a>
  <div class="topnav-links">
    <a href="index.html" class="active">Dashboard</a>
    <a href="https://drive.google.com/drive/u/0/folders/1kS-2awScLDAnGS973xD0D28RxynI49Si" target="_blank" style="color:var(--cyan)">📁 Plans & Permits</a>
    <a href="selections.html" style="color:var(--purple)">🎨 Selections</a>
    <a href="electrical.html" style="color:var(--yellow)">⚡ Electrical</a>
  </div>
  <button class="topnav-refresh" onclick="doRefresh()">↻ Refresh</button>
</div></nav>

<div id="loading"><div class="spinner"></div><div class="msg">Loading schedule…</div></div>
<div id="error"><h2>⚠ Failed to load data</h2><div class="detail" id="errorDetail"></div><br><button class="btn btn-blue" onclick="doRefresh()">Retry</button></div>

<div id="app">
  <div class="hero-wrap">
    <div class="hero no-sub" id="hero"></div>
  </div>
  <div class="gantt-phase-tracker" id="ganttPhaseTracker"></div>
  <div class="gantt-outer">
    <div class="gantt-wrap">
      <div class="gantt-head">
        <div class="head-label">Task / Subcontractor</div>
        <div class="head-months" id="mhdr"></div>
      </div>
      <div class="gantt-body" id="gb">
        <div class="gantt-inner" id="gi"></div>
      </div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:var(--green)"></div>Complete</div>
        <div class="li"><div class="ld" style="background:var(--orange)"></div>Active / on site</div>
        <div class="li"><div class="ld" style="background:var(--red)"></div>Overdue</div>
        <div class="li"><div class="ld" style="background:var(--bdr2)"></div>Upcoming</div>
        <div class="li"><div class="ld" style="background:rgba(239,68,68,.25);border:1px dashed rgba(239,68,68,.8)"></div>Delay (after finish)</div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js?v20260424_schedulecols"></script>
<script>
const GANTT_LBL=250;
let allTasks=[];

function renderHeroHeader(tasks){
  const h=getPrimarySubcontractorHeroState(tasks,{});
  const hero=document.getElementById('hero');
  hero.className=h.className;
  hero.innerHTML=h.html;
}

function renderGanttReadonly(tasks){
  const today=new Date();today.setHours(0,0,0,0);
  const gi=document.getElementById('gi');
  const mhdr=document.getElementById('mhdr');
  gi.innerHTML='';mhdr.innerHTML='';

  const filtered=filterScheduleTasksForDisplay(tasks);

  let gMin=Infinity,gMax=-Infinity;
  for(const t of filtered){
    if(t.startDate)gMin=Math.min(gMin,t.startDate.getTime());
    const eff=taskScheduleEnd(t);
    if(eff)gMax=Math.max(gMax,eff.getTime());
    else if(t.endDate)gMax=Math.max(gMax,t.endDate.getTime());
  }
  if(!isFinite(gMin)){gMin=today.getTime()-30*864e5;gMax=today.getTime()+90*864e5}
  gMin=Math.min(gMin,today.getTime()-20*864e5);
  gMax=Math.max(gMax,today.getTime()+45*864e5);

  const gS=new Date(new Date(gMin).getFullYear(),new Date(gMin).getMonth(),1);
  const gER=new Date(gMax);
  const gE=new Date(gER.getFullYear(),gER.getMonth()+1,0);
  const gD=Math.max(1,daysBetween(gS,gE));
  const todayPct=Math.min(100,Math.max(0,daysBetween(gS,today)/gD*100));

  {let d=new Date(gS);while(d<=gE){
    const isCur=d.getMonth()===today.getMonth()&&d.getFullYear()===today.getFullYear();
    const dim=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    const el=document.createElement('div');
    el.className='mhdr'+(isCur?' cur':'');
    el.style.width=(dim/gD*100)+'%';
    el.textContent=fmtMoShort(d);
    mhdr.appendChild(el);
    d=new Date(d.getFullYear(),d.getMonth()+1,1);
  }}

  renderHeroHeader(tasks);

  for(const t of filtered){
    if(!t.startDate)continue;
    const s=t.startDate,e=t.endDate||s;
    const dly=Math.max(0,parseInt(t.delay,10)||0);
    const effEnd=taskScheduleEnd(t)||e;
    const prog=t.progress;
    const overdue=!t.isPhase&&effEnd<today&&prog<100;
    const active=!t.isPhase&&s<=today&&effEnd>=today;
    const done=prog>=100;

    const row=document.createElement('div');
    row.className='g-row'+(t.isPhase?' ph':'')+(active?' act':'')+(overdue?' ov':'');

    const lbl=document.createElement('div');lbl.className='g-lbl';
    const vsub=t.vendor&&!t.isPhase?'<div class="g-sub">'+escHtml(t.vendor)+'</div>':'';
    const nm=t.isPhase?escHtml(PHASE_SPELL_FIX[t.nameNorm]||t.name):escHtml(t.name);
    lbl.innerHTML='<div class="g-name">'+nm+'</div>'+vsub;

    const tl=document.createElement('div');tl.className='g-tl';
    const left=Math.max(0,daysBetween(gS,s)/gD*100);
    const rightWork=Math.min(100,daysBetween(gS,e)/gD*100);
    const wWork=Math.max(.3,rightWork-left);
    const bc=done?'dn':overdue?'od':active?'ac':'';
    const bar=document.createElement('div');
    bar.className='g-bar '+bc;
    bar.style.left=left+'%';bar.style.width=wWork+'%';
    if(!t.isPhase&&prog>0&&!done){
      const fill=document.createElement('div');
      fill.className='g-fill';fill.style.width=Math.min(100,prog)+'%';
      bar.appendChild(fill);
    }
    tl.appendChild(bar);
    if(dly>0&&e&&effEnd>e){
      const rightEff=Math.min(100,daysBetween(gS,effEnd)/gD*100);
      const wDel=Math.max(.25,rightEff-rightWork);
      const del=document.createElement('div');
      del.className='g-delay';
      del.style.left=rightWork+'%';
      del.style.width=wDel+'%';
      del.title='Delay: '+dly+' day'+(dly===1?'':'s')+' (after finish)';
      tl.appendChild(del);
    }
    row.appendChild(lbl);row.appendChild(tl);
    gi.appendChild(row);
  }

  const tm=document.createElement('div');
  tm.className='today-mk';
  tm.style.left='calc('+GANTT_LBL+'px + (100% - '+GANTT_LBL+'px) * '+todayPct+' / 100)';
  tm.innerHTML='<div class="today-lbl">▼ Today</div>';
  gi.appendChild(tm);

  const gb=document.getElementById('gb');
  requestAnimationFrame(()=>{
    const bw=gb.clientWidth-GANTT_LBL;
    const tw=(gi.scrollWidth-GANTT_LBL)*todayPct/100;
    gb.scrollLeft=Math.max(0,tw-bw/2);
  });
  gb.onscroll=()=>{mhdr.parentElement.scrollLeft=gb.scrollLeft};
}

async function doRefresh(){
  document.getElementById('loading').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('error').style.display='none';
  try{await init()}catch(e){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('errorDetail').textContent=e.message}
}
async function init(){
  try{
    const{main}=await loadProjectData();
    allTasks=main.scheduleTasks||[];
    const pt=document.getElementById('ganttPhaseTracker');
    if(pt)pt.innerHTML=renderPhaseTrackerHTML(main);
    renderGanttReadonly(allTasks);
    document.getElementById('loading').style.display='none';document.getElementById('app').style.display='block'
  }catch(e){
    document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('errorDetail').textContent=e.message
  }
}
init()
</script>
