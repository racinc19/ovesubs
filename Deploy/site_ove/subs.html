<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVE subs — Click Portal</title>
<style>
:root{--bg:#0c1220;--card:#141e30;--bdr:#2a3a55;--txt:#e8edf5;--txt2:#8899b0;--dim:#5a6d85;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f59e0b;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-top:56px}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
.topnav{position:fixed;top:0;left:0;width:100vw;z-index:50;background:var(--card);border-bottom:1px solid var(--bdr);padding:0 20px}
.topnav-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
.topnav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-weight:700;font-size:16px}
.topnav-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topnav-links{display:flex;gap:4px;align-items:center;position:absolute;left:50%;transform:translateX(-50%)}
.topnav-links a{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;color:var(--txt2);text-decoration:none;transition:all .2s;white-space:nowrap}
.topnav-links a:hover{color:var(--txt);background:var(--hover)}
.topnav-links a.active{color:white;background:var(--blue)}
.topnav-refresh{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:none;color:var(--txt2);cursor:pointer;transition:all .2s;white-space:nowrap}
.topnav-refresh:hover{border-color:var(--blue);color:var(--txt)}
.hero{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:28px 32px;margin-bottom:24px;text-align:center}
.hero-title{font-size:22px;font-weight:700;margin-bottom:4px}
.hero-sub{font-size:14px;color:var(--txt2)}
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.vendor-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--txt);display:block}
.vendor-card:hover{border-color:var(--blue);background:rgba(59,130,246,.05)}
.vendor-card:active{transform:scale(.98)}
.vendor-name{font-size:16px;font-weight:700;margin-bottom:4px}
.vendor-trade{font-size:13px;color:var(--txt2);margin-bottom:12px}
.vendor-stats{display:flex;gap:12px;align-items:center}
.stat-pct{font-size:20px;font-weight:800;color:var(--blue)}
.stat-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.vendor-progress{flex:1;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.vendor-progress-fill{height:100%;border-radius:2px}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px}
.spinner{width:48px;height:48px;border:4px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav class="topnav"><div class="topnav-inner">
  <a href="index.html" class="topnav-brand"><span class="dot"></span>OVE subs</a>
  <div class="topnav-links">
    <a href="index.html">Dashboard</a>
    <a href="https://drive.google.com/drive/u/0/folders/1kS-2awScLDAnGS973xD0D28RxynI49Si" target="_blank" style="color:var(--cyan)">📁 Plans & Permits</a>
    <a href="selections.html">🎨 Selections</a>
    <a href="electrical.html">⚡ Electrical</a>
    <a href="subs.html" class="active" style="color:var(--green)">🔑 Click Portal</a>
  </div>
  <a href="index.html" class="topnav-refresh" style="text-decoration:none">← Dashboard</a>
</div></nav>

<div id="loading"><div class="spinner"></div><div style="color:var(--txt2)">Loading vendors…</div></div>

<div class="container" id="app" style="display:none">
  <div class="hero">
    <div class="hero-title">🔑 OVE Subs Portal Entry</div>
    <div class="hero-sub">Click your company name below to access your portal</div>
  </div>
  <div class="vendor-grid" id="vendorGrid"></div>
</div>

<script src="shared.js?v20260426_portal_cards"></script>
<script>
async function init(){
  try{
    const data=await loadProjectData();
    const tasks=data.main.scheduleTasks||[];
    const vendors=[];
    const seen=new Set();
    
    // Extract unique vendors from schedule
    for(const t of tasks){
      if(t.vendor&&!t.isPhase&&!seen.has(t.vendor.toLowerCase())){
        seen.add(t.vendor.toLowerCase());
        vendors.push({
          name:t.vendor,
          trade:t.name,
          progress:Math.round(t.progress)
        });
      }
    }
    
    // Cabinet vendor is tracked in the Subs sheet/portal alias even when the schedule row is blank.
    if(!seen.has('deezcabnuts')&&!seen.has('deez')){
      seen.add('deezcabnuts');
      vendors.push({name:'DeezCabnuts',trade:'Cabinet',progress:0});
    }

    // Sort alphabetically
    vendors.sort((a,b)=>a.name.localeCompare(b.name));
    
    const grid=document.getElementById('vendorGrid');
    for(const v of vendors){
      const card=document.createElement('a');
      card.className='vendor-card';
      card.href='sub.html?v='+encodeURIComponent(v.name);
      const cls=v.progress>=100?'var(--green)':v.progress>0?'var(--orange)':'var(--dim)';
      card.innerHTML=`
        <div class="vendor-name">${v.name}</div>
        <div class="vendor-trade">${v.trade}</div>
        <div class="vendor-stats">
          <div>
            <div class="stat-pct" style="color:${cls}">${v.progress}%</div>
            <div class="stat-label">Complete</div>
          </div>
          <div class="vendor-progress">
            <div class="vendor-progress-fill" style="width:${Math.min(v.progress,100)}%;background:${cls}"></div>
          </div>
        </div>`;
      grid.appendChild(card);
    }
    
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='';
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="color:var(--red)">Failed to load vendors: '+e.message+'</div>';
  }
}
init();
</script>
</body>
</html>
