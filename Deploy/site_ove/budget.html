<script src="shared.js?v1772133761"></script>
<script>
var CO_KEY='rodriguez_change_orders_v3';
var CO_SEED=[{
  num:'CO-001',desc:'Door Automation — Upgrade (3) sliding doors to automatic (Dining, Primary Bed, Primary Bath)',
  vendor:'AutoSlide',amount:20038.95,paid:0,date:'2026-02-06',status:'approved',pct:0,
  notes:'$6,679.65 ea × 3 doors. Original contract $3,168,660. Revised $3,188,698.95'
}];
var changeOrders=[];
function loadCOs(){
  try{changeOrders=JSON.parse(localStorage.getItem(CO_KEY)||'[]')}catch(e){changeOrders=[]}
  if(changeOrders.length===0){changeOrders=CO_SEED.slice();saveCOs()}
}
function saveCOs(){localStorage.setItem(CO_KEY,JSON.stringify(changeOrders))}
function coEsc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function openCOModal(idx){
  var isEdit=typeof idx==='number'&&idx>=0;
  document.getElementById('coModalTitle').textContent=isEdit?'Edit Change Order':'Add Change Order';
  document.getElementById('coEditIdx').value=isEdit?idx:-1;
  if(isEdit){
    var co=changeOrders[idx];
    document.getElementById('coNum').value=co.num||'';
    document.getElementById('coDesc').value=co.desc||'';
    document.getElementById('coVendor').value=co.vendor||'';
    document.getElementById('coAmt').value=co.amount||'';
    document.getElementById('coPaid').value=co.paid||0;
    document.getElementById('coDate').value=co.date||'';
    document.getElementById('coStatus').value=co.status||'pending';
    document.getElementById('coPct').value=co.pct||0;
    document.getElementById('coNotes').value=co.notes||'';
  }else{
    document.getElementById('coNum').value='CO-'+String(changeOrders.length+1).padStart(3,'0');
    document.getElementById('coDesc').value='';
    document.getElementById('coVendor').value='';
    document.getElementById('coAmt').value='';
    document.getElementById('coPaid').value='';
    document.getElementById('coDate').value=new Date().toISOString().slice(0,10);
    document.getElementById('coStatus').value='pending';
    document.getElementById('coPct').value='0';
    document.getElementById('coNotes').value='';
  }
  document.getElementById('coOverlay').classList.add('open');
  document.getElementById('coModal').classList.add('open');
}
function closeCOModal(){
  document.getElementById('coOverlay').classList.remove('open');
  document.getElementById('coModal').classList.remove('open');
}
function saveCO(){
  var idx=parseInt(document.getElementById('coEditIdx').value);
  var co={
    num:document.getElementById('coNum').value.trim()||'CO-???',
    desc:document.getElementById('coDesc').value.trim(),
    vendor:document.getElementById('coVendor').value.trim(),
    amount:parseFloat(document.getElementById('coAmt').value)||0,
    paid:parseFloat(document.getElementById('coPaid').value)||0,
    date:document.getElementById('coDate').value,
    status:document.getElementById('coStatus').value,
    pct:parseInt(document.getElementById('coPct').value)||0,
    notes:document.getElementById('coNotes').value.trim()
  };
  if(idx>=0)changeOrders[idx]=co;else changeOrders.push(co);
  saveCOs();closeCOModal();doRefresh();
}
function deleteCO(idx){
  if(!confirm('Delete '+changeOrders[idx].num+'?'))return;
  changeOrders.splice(idx,1);saveCOs();doRefresh();
}

function render(phases,paidData){
  // Use COs from sheet, merge with any locally added ones
  var sheetCOs=paidData.sheetCOs||[];
  // Merge: sheet COs take precedence, local-only COs appended
  changeOrders=sheetCOs.slice();
  var localCOs=[];
  try{localCOs=JSON.parse(localStorage.getItem(CO_KEY)||'[]')}catch(e){}
  // Append any local COs not already in sheet (by num)
  var sheetNums=sheetCOs.map(function(c){return c.num});
  localCOs.forEach(function(co){if(!sheetNums.includes(co.num))changeOrders.push(co)});
  var baseTotal=0,basePaid=paidData.totalPaid,itemCount=0,earliest=null,latest=null;

  for(var p=0;p<phases.length;p++){
    var phase=phases[p];
    if(phase.name==='options'||phase.name==='contingency')continue;
    var phaseDrawnTotal=0,phaseBudgetTotal=0,phaseEarliest=null,phaseLatest=null;
    for(var j=0;j<phase.items.length;j++){
      var item=phase.items[j];
      item.paid=paidData.map[phase.name+'|'+item.nameNorm]||0;
      item.progress=paidData.progressMap[phase.name+'|'+item.nameNorm]||0;
      phase.paidTotal=(phase.paidTotal||0)+item.paid;
      phaseDrawnTotal+=item.progress*item.markup;
      phaseBudgetTotal+=item.markup;
      if(item.startDate){if(!phaseEarliest||item.startDate<phaseEarliest)phaseEarliest=item.startDate;if(!earliest||item.startDate<earliest)earliest=item.startDate}
      if(item.endDate){if(!phaseLatest||item.endDate>phaseLatest)phaseLatest=item.endDate;if(!latest||item.endDate>latest)latest=item.endDate}
    }
    phase.progress=phaseBudgetTotal>0?(phaseDrawnTotal/phaseBudgetTotal):0;
    phase.startDate=phaseEarliest;phase.endDate=phaseLatest;
    baseTotal+=phase.markupTotal;itemCount+=phase.items.length;
  }

  // CO totals
  var coApproved=changeOrders.filter(function(c){return c.status==='approved'});
  var coPending=changeOrders.filter(function(c){return c.status==='pending'});
  var coRejected=changeOrders.filter(function(c){return c.status==='rejected'});
  var coApprovedAmt=0,coPendingAmt=0,coPaidTotal=0;
  for(var i=0;i<coApproved.length;i++){coApprovedAmt+=coApproved[i].amount*((coApproved[i].pct||0)/100);coPaidTotal+=(coApproved[i].paid||0)}
  for(var i=0;i<coPending.length;i++){coPendingAmt+=coPending[i].amount}

  var revisedTotal=baseTotal+coApprovedAmt;
  var totalPaid=basePaid+coPaidTotal;
  var totalRemaining=revisedTotal-totalPaid;
  var pctPaid=revisedTotal>0?((totalPaid/revisedTotal)*100):0;
  var today=new Date();

  // Summary cards
  document.getElementById('summaryGrid').innerHTML=
    '<div class="sum-card"><div class="lbl">Original Contract</div><div class="val b">'+fmtK(baseTotal)+'</div></div>'+
    '<div class="sum-card"><div class="lbl">Approved COs</div><div class="val" style="color:var(--purple)">'+(coApprovedAmt>0?'+':'')+fmtK(coApprovedAmt)+'</div>'+(coPendingAmt>0?'<div class="sub">+'+fmtK(coPendingAmt)+' pending</div>':'')+'</div>'+
    '<div class="sum-card"><div class="lbl">Revised Total</div><div class="val c">'+fmtK(revisedTotal)+'</div></div>'+
    '<div class="sum-card"><div class="lbl">Total Paid</div><div class="val g">'+fmtK(totalPaid)+'</div></div>'+
    '<div class="sum-card"><div class="lbl">Remaining</div><div class="val y">'+fmtK(totalRemaining)+'</div></div>'+
    '<div class="sum-card"><div class="lbl">Timeline</div><div class="val c" style="font-size:16px">'+(earliest?fmtDate(earliest):'—')+' — '+(latest?fmtDate(latest):'—')+'</div></div>';

  // Budget meta
  document.getElementById('budgetMeta').textContent=
    phases.filter(function(p){return p.name!=='options'&&p.name!=='contingency'}).length+' phases · '+
    itemCount+' items · '+pctPaid.toFixed(1)+'% paid';

  // ── Main Budget Table (Contract | %Comp | Invoiced | Paid | Outstanding) ──
  var html='';
  // Render Change Orders inline first (matches sheet order)
  var sheetCOs=paidData.sheetCOs||[];
  if(sheetCOs.length>0){
    html+='<tr class="phase-row"><td colspan="11"><span class="phase-name" style="color:var(--purple)">Change Orders</span></td></tr>';
    for(var ci=0;ci<sheetCOs.length;ci++){
      var co=sheetCOs[ci];
      var coOut=co.outstanding||0;
      var coPct=(co.pct||0);var coPctD=coPct.toFixed(0);
      var cColor=coPct>=100?'var(--green)':coPct>0?'var(--orange)':'var(--dim)';
      html+='<tr>'+
        '<td style="font-weight:600;color:var(--purple)">'+coEsc(co.num)+'</td>'+
        '<td style="color:var(--txt2)">'+coEsc(co.desc)+'</td>'+
        '<td class="amount">'+fmt(co.amount)+'</td>'+
        '<td style="text-align:center"><span class="mini-bar"><span class="mini-fill" style="width:'+coPctD+'%;background:'+cColor+'"></span></span> <span style="color:'+cColor+';font-size:11px;font-weight:600">'+coPctD+'%</span></td>'+
        '<td class="amount">'+(co.invoiced>0?fmt(co.invoiced):'—')+'</td>'+
        '<td class="paid">'+(co.paid>0?fmt(co.paid):'—')+'</td>'+
        '<td class="remaining" style="color:'+(coOut<0?'var(--red)':'var(--dim)')+'">'+(coOut!==0?fmt(coOut):'—')+'</td>'+
        '<td class="date">—</td><td class="dur">—</td><td class="date">—</td><td class="ctr">—</td>'+
        '</tr>';
    }
  }
  for(var p=0;p<phases.length;p++){
    var phase=phases[p];
    if(phase.name==='options'||phase.name==='contingency')continue;
    var phasePct=phase.progress.toFixed(0);
    var pColor=phase.progress>=100?'var(--green)':phase.progress>0?'var(--orange)':'var(--dim)';
    var phaseInvoiced=phase.items.reduce(function(s,i){return s+(i.invoiced||0)},0);
    var phaseOutstanding=phase.items.reduce(function(s,i){return s+(i.outstanding||0)},0);

    html+='<tr class="phase-row">'+
      '<td style="font-weight:700;font-size:14px;color:var(--blue)">'+phase.display+'</td>'+
      '<td style="font-weight:700;color:var(--txt2)">'+(phase.subtotal>0?fmt(phase.subtotal):'')+'</td>'+
      '<td></td><td></td><td></td><td></td><td></td>'+
      '</tr>';

    for(var j=0;j<phase.items.length;j++){
      var item=phase.items[j];
      var invoiced=item.invoiced||0;
      var outstanding=item.outstanding||0;
      var iPct=item.progress.toFixed(0);
      var iColor=item.progress>=100?'var(--green)':item.progress>0?'var(--orange)':'var(--dim)';

      html+='<tr><td>'+item.name+'</td><td class="vendor">'+(item.vendor||'—')+'</td>'+
        '<td class="amount">'+fmt(item.markup)+'</td>'+
        '<td style="text-align:center"><span class="mini-bar"><span class="mini-fill" style="width:'+iPct+'%;background:'+iColor+'"></span></span> <span style="color:'+iColor+';font-size:11px;font-weight:600">'+iPct+'%</span></td>'+
        '<td class="amount">'+(invoiced>0?fmt(invoiced):'—')+'</td>'+
        '<td class="paid '+(item.paid===0?'zero':'')+'">'+(item.paid>0?fmt(item.paid):'—')+'</td>'+
        '<td class="remaining" style="color:'+(outstanding!==0?'var(--red)':'var(--dim)')+'">'+(outstanding!==0?fmt(outstanding):'—')+'</td>'+
        '<td class="date">'+(item.startDate?fmtDate(item.startDate):'—')+'</td>'+
        '<td class="dur">'+(item.duration||'—')+'</td>'+
        '<td class="date">'+(item.endDate?fmtDate(item.endDate):'—')+'</td>'+
        '<td class="ctr" style="color:'+(item.delay>0?'var(--red)':'var(--dim)')+'">'+(item.delay!=null&&item.delay!==0?item.delay:'—')+'</td>'+
        '</tr>';
    }
  }
  // Grand total row
  var totalInvoiced=0,totalOutstanding=0;
  for(var p=0;p<phases.length;p++){
    if(phases[p].name==='options'||phases[p].name==='contingency')continue;
    for(var j=0;j<phases[p].items.length;j++){
      totalInvoiced+=(phases[p].items[j].invoiced||0);
      totalOutstanding+=(phases[p].items[j].outstanding||0);
    }
  }
  html+='<tr class="grand-row"><td colspan="2">Contract Total</td>'+
    '<td class="amount">'+fmt(baseTotal)+'</td>'+
    '<td></td><td></td><td></td><td></td><td></td><td></td><td></td>'+
    '<td class="amount">'+fmt(totalInvoiced)+'</td>'+
    '<td class="paid">'+fmt(basePaid)+'</td>'+
    '<td class="amount" style="color:var(--red)">'+fmt(totalOutstanding)+'</td></tr>';
  document.getElementById('budgetBody').innerHTML=html;

  // ── Schedule Table (Trade | Progress | Start | Days | Finish | Delay | Notes) ──
  var tasks=paidData.scheduleTasks||[];
  var sHtml='';
  var scheduleCount=0;
  try{
  for(var t=0;t<tasks.length;t++){
    var task=tasks[t];
    if(task.name==='-Duration')continue;
    scheduleCount++;
    var tPct=(task.progress||0).toFixed(0);
    var tColor=task.progress>=100?'var(--green)':task.progress>0?'var(--orange)':'var(--dim)';
    var delayColor=task.delay>0?'var(--red)':'var(--dim)';
    if(task.isPhase){
      sHtml+='<tr class="phase-row"><td colspan="11"><span class="phase-name">'+task.name+'</span></td></tr>';
    }else{
      sHtml+='<tr>'+
        '<td>'+task.name+'</td>'+
        '<td style="text-align:center"><span class="mini-bar"><span class="mini-fill" style="width:'+tPct+'%;background:'+tColor+'"></span></span> <span style="color:'+tColor+';font-size:11px;font-weight:600">'+tPct+'%</span></td>'+
        '<td class="date">'+fmtDate(task.startDate)+'</td>'+
        '<td class="dur">'+(task.duration||'—')+'</td>'+
        '<td class="date">'+fmtDate(task.endDate)+'</td>'+
        '<td style="text-align:center;font-weight:'+(task.delay>0?'700':'400')+';color:'+delayColor+'">'+(task.delay||'0')+'</td>'+
        '<td class="vendor">'+(task.vendor||'—')+'</td></tr>';
    }
  }
  if(scheduleCount===0) sHtml='<tr><td colspan="11" style="text-align:center;color:var(--dim);padding:20px">No schedule data</td></tr>';
  if(document.getElementById('scheduleBody'))document.getElementById('scheduleBody').innerHTML=sHtml;
  if(document.getElementById('scheduleMeta'))document.getElementById('scheduleMeta').textContent=scheduleCount+' tasks';
  }catch(schedErr){console.warn('Schedule render error:',schedErr);if(document.getElementById('scheduleBody'))document.getElementById('scheduleBody').innerHTML='<tr><td colspan="11" style="color:var(--dim);padding:12px">Schedule data unavailable</td></tr>';}

  // ── Change Orders Section ──
  if(document.getElementById('coMeta'))document.getElementById('coMeta').textContent=
    changeOrders.length+' total · '+coApproved.length+' approved · '+coPending.length+' pending';

  // CO summary cards
  if(document.getElementById('coSummary'))document.getElementById('coSummary').innerHTML=
    '<div class="co-stat"><div class="co-stat-lbl">Approved</div><div class="co-stat-val" style="color:var(--purple)">'+(coApprovedAmt>0?'+':'')+fmt(coApprovedAmt)+'</div></div>'+
    '<div class="co-stat"><div class="co-stat-lbl">CO Paid</div><div class="co-stat-val" style="color:var(--green)">'+fmt(coPaidTotal)+'</div></div>'+
    '<div class="co-stat"><div class="co-stat-lbl">CO Remaining</div><div class="co-stat-val" style="color:var(--yellow)">'+fmt(coApprovedAmt-coPaidTotal)+'</div></div>'+
    '<div class="co-stat"><div class="co-stat-lbl">Pending</div><div class="co-stat-val" style="color:var(--orange)">'+fmt(coPendingAmt)+'</div></div>'+
    '<div class="co-stat"><div class="co-stat-lbl">Revised Contract</div><div class="co-stat-val" style="color:var(--cyan)">'+fmt(revisedTotal)+'</div></div>';

  // CO table
  var coHtml='';
  if(changeOrders.length===0){
    coHtml='<tr><td colspan="10" style="text-align:center;color:var(--dim);padding:20px">No change orders yet — click <strong style="color:var(--purple)">+ Add Change Order</strong> to create one</td></tr>';
  }else{
    for(var i=0;i<changeOrders.length;i++){
      var co=changeOrders[i];
      var coRem2=co.amount-(co.paid||0);
      var coPct=co.pct||0;
      var ciColor=coPct>=100?'var(--green)':coPct>0?'var(--orange)':'var(--dim)';
      var coSt,coBadge;
      if(co.status==='rejected'){coSt='rejected';coBadge='badge-rejected'}
      else if(co.status==='approved'&&coPct>=100){coSt='done';coBadge='badge-done'}
      else if(co.status==='approved'&&coPct>0){coSt='active';coBadge='badge-active'}
      else if(co.status==='approved'){coSt='approved';coBadge='badge-done'}
      else{coSt='pending';coBadge='badge-pending'}

      coHtml+='<tr class="co-row">'+
        '<td style="font-weight:700;color:var(--purple)">'+coEsc(co.num)+'</td>'+
        '<td>'+coEsc(co.desc)+(co.notes?'<div style="font-size:11px;color:var(--dim)">'+coEsc(co.notes)+'</div>':'')+'</td>'+
        '<td class="vendor">'+coEsc(co.vendor||'—')+'</td>'+
        '<td class="amount" style="color:var(--purple)">'+fmt(co.amount)+'</td>'+
        '<td class="paid '+((co.paid||0)===0?'zero':'')+'">'+(co.paid>0?fmt(co.paid):'—')+'</td>'+
        '<td class="remaining">'+fmt(coRem2)+'</td>'+
        '<td style="text-align:center"><span class="mini-bar"><span class="mini-fill" style="width:'+coPct+'%;background:'+ciColor+'"></span></span> <span style="color:'+ciColor+';font-size:11px;font-weight:600">'+coPct+'%</span></td>'+
        '<td class="date">'+(co.date||'—')+'</td>'+
        '<td style="text-align:center"><span class="badge '+coBadge+'">'+coSt+'</span></td>'+
        '<td style="text-align:center;white-space:nowrap"><button class="co-act co-act-edit" onclick="openCOModal('+i+')">✏ Edit</button><button class="co-act co-act-del" onclick="deleteCO('+i+')">🗑</button></td></tr>';
    }
    // CO total row
    coHtml+='<tr class="co-total">'+
      '<td colspan="3">Approved CO Total</td>'+
      '<td class="amount" style="color:var(--purple)">'+fmt(coApprovedAmt)+'</td>'+
      '<td class="paid">'+fmt(coPaidTotal)+'</td>'+
      '<td class="remaining">'+fmt(coApprovedAmt-coPaidTotal)+'</td>'+
      '<td colspan="4"></td></tr>';
    // Revised grand total
    coHtml+='<tr class="grand-row">'+
      '<td colspan="3">Revised Contract Total</td>'+
      '<td class="amount">'+fmt(revisedTotal)+'</td>'+
      '<td class="paid">'+fmt(totalPaid)+'</td>'+
      '<td class="amount" style="color:var(--yellow)">'+fmt(totalRemaining)+'</td>'+
      '<td colspan="4"></td></tr>';
  }
  if(document.getElementById('coBody'))document.getElementById('coBody').innerHTML=coHtml;
}

async function doRefresh(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('error').style.display='none';
  try{await init()}catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('errorDetail').textContent=e.message;
  }
}
async function init(){
  try{
    var d=await loadProjectData();
    var phases=d.main.phases;
    var paidData={map:{},progressMap:{},totalPaid:d.totals.totalPaid,scheduleTasks:d.main.scheduleTasks||[],sheetCOs:d.main.sheetCOs||[]};
    for(var p=0;p<phases.length;p++){
      for(var j=0;j<phases[p].items.length;j++){
        var item=phases[p].items[j];
        if(item.paid>0)paidData.map[phases[p].name+'|'+item.nameNorm]=item.paid;
        if(item.progress>0)paidData.progressMap[phases[p].name+'|'+item.nameNorm]=item.progress;
      }
    }
    // Build schedule lookup by item name
    var schedLookup={};
    (paidData.scheduleTasks||[]).forEach(function(t){
      if(!t.isPhase) schedLookup[t.name.toLowerCase().trim()]=t;
    });
    // Merge schedule dates/delay into budget items
    for(var p=0;p<phases.length;p++){
      for(var j=0;j<phases[p].items.length;j++){
        var it=phases[p].items[j];
        var st=schedLookup[it.name.toLowerCase().trim()];
        if(st){
          it.startDate=st.startDate||null;
          it.endDate=st.endDate||null;
          it.duration=st.duration||0;
          it.delay=st.delay||0;
        }
      }
    }
    render(phases,paidData);
    document.getElementById('updatedAt').innerHTML='<span class="live-dot"></span>Live from Google Sheet · '+new Date().toLocaleString();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('errorDetail').textContent=e.message;
    console.error('Init error:',e);
  }
}
init();
</script>
