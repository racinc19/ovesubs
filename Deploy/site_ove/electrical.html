html{overflow-y:scroll}

.topnav-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:8px;min-height:56px;flex-wrap:wrap;padding:8px 0}

.topnav-links a{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--txt2);text-decoration:none;transition:all .2s;white-space:nowrap}

.topnav-links a.active{color:white;background:var(--blue)}
.container{max-width:1400px;margin:0 auto;padding:18px 20px 40px}
.h1{font-size:20px;font-weight:900;margin-top:6px}
.sub{color:var(--txt2);font-size:13px;margin-top:6px}
.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;margin-top:14px}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.card-h{padding:14px 16px;border-bottom:1px solid rgba(42,58,85,.45);background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0))}
.card h2{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:#fff}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:9px 10px;border-top:1px solid rgba(42,58,85,.35);font-size:12px;vertical-align:top}
th{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.8px;background:rgba(0,0,0,.18);border-top:none;position:sticky;top:0}
.num{text-align:right;white-space:nowrap}
.muted{color:var(--txt2)}
details.cat{border-top:1px solid rgba(42,58,85,.35)}
details.cat summary{cursor:pointer;list-style:none;padding:12px 16px;font-size:12px;font-weight:800;color:var(--cyan);background:rgba(6,182,212,.06)}
details.cat summary::-webkit-details-marker{display:none}
.note{padding:12px 16px;font-size:12px;color:var(--txt2)}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:800;border:1px solid rgba(234,179,8,.35);color:var(--yellow);background:rgba(234,179,8,.07);margin-left:8px}

  <script>
(function(){
  const LS_KEY='ovesubs_electrical_csv_url';

  function parseCsv(text){
    const rows=[];
    let row=[];
    let field='';
    let inQuotes=false;
    for(let i=0;i<text.length;i++){
      const ch=text[i];
      if(inQuotes){
        if(ch==='"'){
          const next=text[i+1];
          if(next==='"'){ field+='"'; i++; }
          else inQuotes=false;
        }else field+=ch;
        continue;
      }
      if(ch==='"'){ inQuotes=true; continue; }
      if(ch===','){ row.push(field); field=''; continue; }
      if(ch==='\n'){
        row.push(field);
        rows.push(row);
        row=[];
        field='';
        continue;
      }
      if(ch==='\r') continue;
      field+=ch;
    }
    row.push(field);
    rows.push(row);
    return rows;
  }

  function toNum(s){
    if(s==null) return null;
    const t=String(s).replace(/[$,]/g,'').trim();
    if(!t) return null;
    const n=Number(t);
    return Number.isFinite(n) ? n : null;
  }

  function esc(s){
    return String(s??'')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function isTotalPanelMarker(cell){
    const v=String(cell||'').trim();
    return /^\*\*TOTAL PANEL\s+\d+\s+LOAD\*\*$/.test(v);
  }

  function extractPanelNumberFromMarker(cell){
    const m=String(cell||'').trim().match(/TOTAL PANEL\s+(\d+)\s+LOAD/);
    return m ? Number(m[1]) : null;
  }

  function isCategoryRow(row){
    const c0=String(row[0]||'').trim().toLowerCase();
    return c0==='lighting loads' || c0==='wall loads' || c0==='blinds';
  }

  function normCategory(row){
    const c0=String(row[0]||'').trim().toLowerCase();
    if(c0==='lighting loads') return 'Lighting Loads';
    if(c0==='wall loads') return 'Wall Loads';
    if(c0==='blinds') return 'Blinds';
    return String(row[0]||'').trim();
  }

  function rowLooksLikeHeader(row){
    const joined=row.map(c=>String(c||'').trim().toLowerCase()).filter(Boolean);
    if(!joined.length) return false;
    const hasWatts=joined.some(c=>c==='watts' || c.includes('watts'));
    const hasAmps=joined.some(c=>c==='load a' || c.includes('continuous') || c==='amps' || c.includes('amps'));
    const hasBreaker=joined.some(c=>c==='breaker' || c.includes('breaker'));
    return hasWatts && hasAmps && hasBreaker;
  }

  function findColumnIndex(headerRow, candidates){
    const normalized=headerRow.map(h=>String(h||'').trim().toLowerCase());
    for(const c of candidates){
      const idx=normalized.findIndex(h=>h===c);
      if(idx>=0) return idx;
    }
    for(const c of candidates){
      const idx=normalized.findIndex(h=>h.includes(c));
      if(idx>=0) return idx;
    }
    return -1;
  }

  function autoDetectNumericColumn(rows, startIdx, stopFn, lookahead=50){
    const counts=new Map();
    for(let i=startIdx;i<Math.min(rows.length,startIdx+lookahead);i++){
      const r=rows[i];
      if(stopFn(r)) break;
      const c0=String(r[0]||'').trim().toLowerCase();
      const circuitish=c0.startsWith('circuit') || (!c0 && String(r[1]||'').trim());
      if(!circuitish) continue;
      for(let c=0;c<r.length;c++){
        const n=toNum(r[c]);
        if(n==null) continue;
        if(n<0 || n>5000) continue;
        counts.set(c,(counts.get(c)||0)+1);
      }
    }
    let best=-1,bestCt=0;
    for(const [c,ct] of counts.entries()){
      if(ct>bestCt){best=c;bestCt=ct;}
    }
    return best;
  }

  function parsePanelSummary(rows){
    const header=rows[0]||[];
    const calcIdx=findColumnIndex(header,['calculated load (a)','calculated load']);
    const contIdx=findColumnIndex(header,['continuous load x 125%','continuous load']);
    const breakerIdx=findColumnIndex(header,['recommended breaker']);
    const conductorIdx=findColumnIndex(header,['recommended conductor']);
    const conduitIdx=findColumnIndex(header,['recommended conduit']);

    const panels=[];
    for(let i=1;i<rows.length;i++){
      const name=String(rows[i][0]||'').trim();
      if(!name) continue;
      if(name.startsWith('**TOTAL PANEL')) break;
      panels.push({
        name,
        calcA: toNum(rows[i][calcIdx]),
        contA: toNum(rows[i][contIdx]),
        breaker: String(rows[i][breakerIdx]||'').trim(),
        conductor: String(rows[i][conductorIdx]||'').trim(),
        conduit: String(rows[i][conduitIdx]||'').trim(),
      });
    }
    return panels;
  }

  function parsePanelSections(rows){
    const panels={};
    for(let i=0;i<rows.length;i++){
      if(!isTotalPanelMarker(rows[i][0])) continue;
      const panelNo=extractPanelNumberFromMarker(rows[i][0]);
      if(panelNo==null) continue;
      panels[panelNo]={ panelNo, categories: {} };

      let j=i+1;
      while(j<rows.length && !isCategoryRow(rows[j]) && !isTotalPanelMarker(rows[j][0])) j++;

      while(j<rows.length && isCategoryRow(rows[j])){
        const category=normCategory(rows[j]);
        const categoryRow=rows[j]||[];
        const nextRow=rows[j+1]||[];
        const categoryIsHeader=rowLooksLikeHeader(categoryRow);
        const nextIsHeader=rowLooksLikeHeader(nextRow);
        const nextIsTotal=String(nextRow[0]||'').trim().toLowerCase()==='total';

        const headerRow = categoryIsHeader ? categoryRow : (nextIsHeader ? nextRow : []);
        const dataStart = categoryIsHeader ? (j+1) : (nextIsHeader ? (j+2) : (nextIsTotal ? (j+1) : (j+2)));

        const stopFn=(r)=>isTotalPanelMarker(r[0]) || isCategoryRow(r);

        let wattsIdx=findColumnIndex(headerRow,['watts']);
        let ampsIdx=findColumnIndex(headerRow,['load a','continuous a','amps']);
        let xfIdx=findColumnIndex(headerRow,['transformer']);
        let brkIdx=findColumnIndex(headerRow,['breaker']);
        let loadIdx=findColumnIndex(headerRow,['load','circuit']);
        let descIdx=findColumnIndex(headerRow,['feet/location','location','description']);

        if(ampsIdx<0) ampsIdx=autoDetectNumericColumn(rows,dataStart,stopFn);
        if(wattsIdx<0) wattsIdx=-1;

        const circuits=[];
        let totalRow=null;
        for(let k=dataStart;k<rows.length;k++){
          const r=rows[k];
          if(stopFn(r)) { j=k; break; }
          const c0=String(r[0]||'').trim().toLowerCase();
          if(c0==='total'){
            totalRow={
              watts: wattsIdx>=0 ? String(r[wattsIdx]||'').trim() : '',
              amps: ampsIdx>=0 ? String(r[ampsIdx]||'').trim() : '',
            };
            continue;
          }
          const circuitish=c0.startsWith('circuit') || (!c0 && String(r[1]||'').trim());
          if(!circuitish) continue;

          const load = loadIdx>=0 ? String(r[loadIdx]||'').trim() : (String(r[1]||'').trim());
          const desc = descIdx>=0 ? String(r[descIdx]||'').trim() : '';
          const watts = wattsIdx>=0 ? String(r[wattsIdx]||'').trim() : '';
          const amps = ampsIdx>=0 ? String(r[ampsIdx]||'').trim() : '';
          const xf = xfIdx>=0 ? String(r[xfIdx]||'').trim() : '';
          const brk = brkIdx>=0 ? String(r[brkIdx]||'').trim() : '';
          circuits.push({ load, desc, watts, amps, transformer: xf, breaker: brk });
        }

        panels[panelNo].categories[category]={ totalRow, circuits };
      }
    }
    return panels;
  }

  function rollupEquipment(panels){
    const transformers=new Map();
    const breakers=new Map();
    const devices=new Map();

    function add(map,key,inc=1){
      const k=String(key||'').trim();
      if(!k) return;
      map.set(k,(map.get(k)||0)+inc);
    }

    for(const p of Object.values(panels)){
      for(const cat of Object.values(p.categories||{})){
        for(const c of cat.circuits||[]){
          if(c.transformer) add(transformers,c.transformer);
          if(c.breaker) add(breakers,c.breaker);
          const s=(c.load+' '+c.desc+' '+c.transformer+' '+c.breaker).toLowerCase();
          if(s.includes('shelly')){
            const m=(c.desc||'').match(/shelly[^,]*/i) || (c.load||'').match(/shelly[^,]*/i);
            add(devices, m?m[0].trim():'Shelly');
          }
        }
      }
    }

    const sortMap=(m)=>Array.from(m.entries()).sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]));
    return {
      transformers: sortMap(transformers),
      breakers: sortMap(breakers),
      devices: sortMap(devices),
    };
  }

  async function getCsvText(){
    const embedded=document.getElementById('csv').textContent;
    const rawUrl=localStorage.getItem(LS_KEY);
    const url=(rawUrl||'').trim();
    if(!url) return { text: embedded, source: 'Embedded snapshot (no Sheet URL set)' };

    try{
      const u=new URL(url);
      // Cache busting: add _=timestamp, preserve existing params.
      u.searchParams.set('_', String(Date.now()));
      const res=await fetch(u.toString(), { cache: 'no-store' });
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text=await res.text();
      if(!text || text.length<20) throw new Error('Empty/short CSV');
      return { text, source: 'Live Google Sheet CSV' };
    }catch(e){
      return { text: embedded, source: 'Embedded snapshot (Sheet fetch failed)' };
    }
  }

  async function render(){
    const genTs=new Date().toISOString();
    document.getElementById('genSub').textContent='Embedded load sheet CSV. Generated: '+genTs;

    const got=await getCsvText();
    document.getElementById('srcLabel').textContent='Source: '+got.source;
    const csvText=got.text;
    const rows=parseCsv(csvText);
    const panelsSummary=parsePanelSummary(rows);
    const panelsDetail=parsePanelSections(rows);
    const equipment=rollupEquipment(panelsDetail);

    const summaryRows=panelsSummary.map(p=>(
      '<tr>'+
        '<td>'+esc(p.name)+'</td>'+
        '<td class="num">'+esc(p.calcA)+'</td>'+
        '<td class="num">'+esc(p.contA)+'</td>'+
        '<td>'+esc(p.breaker)+'</td>'+
        '<td>'+esc(p.conductor)+'</td>'+
        '<td>'+esc(p.conduit)+'</td>'+
      '</tr>'
    )).join('');

    document.getElementById('panelSummaryCard').innerHTML=
      '<div class="card-h"><h2>Panel Feeders / Summary</h2></div>'+
      '<div class="note">This section reflects the sheet\'s panel summary and confirms the 125% continuous math.</div>'+
      '<div class="table-wrap">'+
        '<table>'+
          '<thead><tr>'+
            '<th>Panel</th>'+
            '<th class="num">Calculated Load (A)</th>'+
            '<th class="num">Continuous @125% (A)</th>'+
            '<th>Recommended Breaker</th>'+
            '<th>Recommended Conductor (Cu)</th>'+
            '<th>Recommended Conduit</th>'+
          '</tr></thead>'+
          '<tbody>'+summaryRows+'</tbody>'+
        '</table>'+
      '</div>';

    document.getElementById('equipIntroCard').innerHTML=
      '<div class="card-h"><h2>Equipment Rollup (from circuits)</h2></div>'+
      '<div class="note">This rollup is extracted from the circuit rows (transformers/breakers referenced in the load sheet).</div>'+
      '<div style="display:grid;gap:12px;padding:12px">'+
        '<div class="muted" style="font-size:12px">Counts are as listed in the load sheet; final purchase list will reconcile with the E105 panel schedule.</div>'+
      '</div>';

    function equipTable(title, entries){
      const rows=entries.map(([k,v])=>('<tr><td>'+esc(k)+'</td><td class="num">'+v+'</td></tr>')).join('');
      return '<section class="card">'+
        '<div class="card-h"><h2>'+esc(title)+'</h2></div>'+
        '<div class="table-wrap">'+
          '<table>'+
            '<thead><tr><th>Item</th><th class="num">Qty</th></tr></thead>'+
            '<tbody>'+(rows||'')+'</tbody>'+
          '</table>'+
        '</div>'+
      '</section>';
    }

    document.getElementById('equipTables').innerHTML=
      equipTable('Transformers / Power Supplies', equipment.transformers)+
      equipTable('Breakers (as labeled in load sheet)', equipment.breakers)+
      equipTable('Shelly / Controls (rough extraction)', equipment.devices);

    const panelBlocks=Object.values(panelsDetail)
      .sort((a,b)=>a.panelNo-b.panelNo)
      .map(p=>{
        const cats=Object.entries(p.categories||{}).map(([catName,cat])=>{
          const circRows=(cat.circuits||[]).map(c=>(
            '<tr>'+
              '<td>'+esc(c.load)+'</td>'+
              '<td>'+esc(c.desc)+'</td>'+
              '<td class="num">'+esc(c.watts)+'</td>'+
              '<td class="num">'+esc(c.amps)+'</td>'+
              '<td>'+esc(c.transformer)+'</td>'+
              '<td>'+esc(c.breaker)+'</td>'+
            '</tr>'
          )).join('');

          return '<details class="cat" open>'+
            '<summary>'+esc(catName)+'</summary>'+
            '<div class="table-wrap">'+
              '<table>'+
                '<thead><tr>'+
                  '<th>Load</th><th>Location/Desc</th><th class="num">Watts</th><th class="num">Amps</th><th>Transformer</th><th>Breaker</th>'+
                '</tr></thead>'+
                '<tbody>'+(circRows||'')+'</tbody>'+
              '</table>'+
            '</div>'+
          '</details>';
        }).join('');

        return '<section class="card">'+
          '<div class="card-h"><h2>Panel '+p.panelNo+' — Detailed Loads</h2></div>'+
          (cats || '<div class="muted" style="padding:16px">No detail rows found for this panel in CSV.</div>')+
        '</section>';
      }).join('');

    document.getElementById('panelBlocks').innerHTML=panelBlocks;
    document.getElementById('app').style.display='block';
  }

  document.getElementById('btnSetUrl').addEventListener('click',()=>{
    const cur=(localStorage.getItem(LS_KEY)||'').trim();
    const v=prompt('Paste published Google Sheet CSV URL (output=csv):', cur);
    if(v==null) return;
    const t=String(v||'').trim();
    if(!t){
      localStorage.removeItem(LS_KEY);
    }else{
      localStorage.setItem(LS_KEY,t);
    }
    location.reload();
  });
  document.getElementById('btnClearUrl').addEventListener('click',()=>{
    localStorage.removeItem(LS_KEY);
    location.reload();
  });

  try{ render(); }
  catch(e){
    document.getElementById('genSub').textContent='Failed to render: '+(e&&e.message?e.message:String(e));
    document.getElementById('app').style.display='block';
    console.error(e);
  }
})();
  </script>
