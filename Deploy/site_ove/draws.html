<script>
var CO_KEY='rodriguez_change_orders_v3';
var CO_SEED=[{
  num:'CO-001',desc:'Door Automation — Upgrade (3) sliding doors to automatic (Dining, Primary Bed, Primary Bath)',
  vendor:'AutoSlide',amount:20038.95,paid:0,date:'2026-02-06',status:'approved',pct:0,
  notes:'$6,679.65 ea × 3 doors. Original contract $3,168,660. Revised $3,188,698.95'
}];
var _data=null;

function loadCOs(){
  var cos;
  try{cos=JSON.parse(localStorage.getItem(CO_KEY)||'[]')}catch(e){cos=[]}
  if(cos.length===0){cos=CO_SEED.slice();localStorage.setItem(CO_KEY,JSON.stringify(cos))}
  return cos;
}

function injectCOs(md,asList){
  var cos=loadCOs();
  for(var i=0;i<cos.length;i++){
    var co=cos[i];
    if(co.status!=='approved'||!co.date)continue;
    var d=new Date(co.date+'T00:00:00');
    if(isNaN(d.getTime()))continue;
    var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!md[k]){
      if(asList) md[k]={month:new Date(d.getFullYear(),d.getMonth(),1),total:0,paid:0,items:[]};
      else md[k]={month:new Date(d.getFullYear(),d.getMonth(),1),budget:0,paid:0};
    }
    if(asList){
      md[k].total+=co.amount;
      md[k].paid+=(co.paid||0);
      md[k].items.push({name:co.num+' '+co.desc,vendor:co.vendor||'',markup:co.amount,paid:co.paid||0,isCO:true});
    }else{
      md[k].budget+=co.amount;
      md[k].paid+=(co.paid||0);
    }
  }
}

var INV_KEY='rac_invoices_v2';
function getInvoiceTotal(){
  try{
    var invs=JSON.parse(localStorage.getItem(INV_KEY)||'[]');
    return invs.reduce(function(s,i){return s+(parseFloat(i.total)||0);},0);
  }catch(e){return 0;}
}
function fmtDateStr(s){if(!s)return'—';var d=new Date(s+'T12:00:00');return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear()}
function getMonthlyPaidMap(){
  var KEY='rac_monthly_invoice_rows_v1';
  try{
    var rows=JSON.parse(localStorage.getItem(KEY)||'[]');
    if(!Array.isArray(rows))return {};
    var map={};
    rows.forEach(function(r){
      if(!r||!r.ym)return;
      var paid=(r.status==='in_progress')?0:Number(r.paid||0);
      if(!isFinite(paid))paid=0;
      map[r.ym]=paid;
    });
    return map;
  }catch(e){return {};}
}
function loadMonthlyRows(){
  var KEY='rac_monthly_invoice_rows_v1';
  try{
    var a=JSON.parse(localStorage.getItem(KEY));
    if(!Array.isArray(a))return [];
    return a.filter(function(r){return r&&r.ym;});
  }catch(e){return [];}
}
function getHistoryMonthAmountMap(){
  // Accounting → History monthly rows are the source of truth for months that have occurred.
  // Use row.amount for Due/Paid months; In progress months are 0.
  var rows=loadMonthlyRows();
  var map={};
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(!r||!r.ym)continue;
    if(r.status==='in_progress'){map[r.ym]={amount:0,status:'in_progress'};continue;}
    var amt=r.amount!=null&&r.amount!==''?Number(r.amount):0;
    if(!isFinite(amt))amt=0;
    map[r.ym]={amount:amt,status:r.status};
  }
  return map;
}
function monthLabelFromYm(ym){
  try{
    var p=String(ym||'').split('-');
    if(p.length!==2)return ym;
    var y=p[0];
    var m=parseInt(p[1],10)-1;
    var names=['January','February','March','April','May','June','July','August','September','October','November','December'];
    return (names[m]||ym)+' '+y;
  }catch(e){return ym;}
}
function getSheetPaidToDate(data){
  try{
    if(data&&data.main&&data.main.buildGrossTotals&&typeof data.main.buildGrossTotals.paid==='number'&&data.main.buildGrossTotals.paid>0) return data.main.buildGrossTotals.paid;
    if(data&&data.totals&&typeof data.totals.totalPaid==='number'&&data.totals.totalPaid>0) return data.totals.totalPaid;
  }catch(e){}
  return 0;
}
function getMergedSheetCOs(main){
  var sheet=(main&&main.sheetCOs)||[];
  var local=[];
  try{local=JSON.parse(localStorage.getItem(CO_KEY)||'[]')}catch(e){}
  var localByNum={};
  local.forEach(function(co){if(co&&co.num)localByNum[co.num]=co;});
  var merged=sheet.map(function(co){
    var l=co&&co.num?localByNum[co.num]:null;
    if(!l) return co;
    var m=Object.assign({},co);
    if(l.status) m.status=l.status;
    return m;
  });
  // Append local-only COs not present on the sheet
  var sheetNums=merged.map(function(c){return c&&c.num;}).filter(Boolean);
  local.forEach(function(co){
    if(!co||!co.num)return;
    if(sheetNums.indexOf(co.num)>=0)return;
    merged.push(co);
  });
  return merged;
}
function getRevisedTotal(main){
  var base=(main&&main.totals&&main.totals.baseBudget!=null)?main.totals.baseBudget:((main&&main.totals&&main.totals.totalBudget)||0);
  var cos=getMergedSheetCOs(main);
  var coAmt=0;
  for(var i=0;i<cos.length;i++) if(cos[i]&&cos[i].status==='approved') coAmt+=Number(cos[i].amount||0);
  return base+coAmt;
}
function reconcileScheduleToRevised(md,main){
  var revised=getRevisedTotal(main);
  var keys=Object.keys(md);
  // Chart month rows use .budget; the expandable list uses .total (and .items). Sum the right field.
  var isList=keys.length>0&&Array.isArray(md[keys[0]].items);
  var sum=0;
  for(var i=0;i<keys.length;i++){
    var r=md[keys[i]];
    sum+=isList?Number(r.total||0):Number(r.budget||0);
  }
  var delta=revised-sum;
  if(delta>1){
    var lastKey=keys.length?keys.slice().sort().slice(-1)[0]:null;
    if(!lastKey){
      var now=new Date();
      lastKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
      if(isList) md[lastKey]={month:new Date(now.getFullYear(),now.getMonth(),1),total:0,paid:0,outstanding:0,items:[]};
      else md[lastKey]={month:new Date(now.getFullYear(),now.getMonth(),1),budget:0,paid:0,outstanding:0};
    }
    if(isList) md[lastKey].total=(Number(md[lastKey].total)||0)+delta;
    else md[lastKey].budget=(Number(md[lastKey].budget)||0)+delta;
  }
  return revised;
}
function renderChart(data){
  var main=data.main||data;
  var phases=main.phases||[];
  var totals=data.totals||{};
  var paidMap=getMonthlyPaidMap();
  var histAmtMap=getHistoryMonthAmountMap();
  var totalPaid=(function(){
    var s=0;for(var k in paidMap){if(Object.prototype.hasOwnProperty.call(paidMap,k))s+=Number(paidMap[k]||0);}
    return s>0?s:getSheetPaidToDate(data);
  })();
  var el=document.getElementById('chartBox');
  var md={};
  var now=new Date();
  var firstOfThisMonth=new Date(now.getFullYear(),now.getMonth(),1);
  var firstOfNextMonth=new Date(now.getFullYear(),now.getMonth()+1,1);
  function addToMonth(y,m,bud,pad,outstd){
    var k=y+'-'+String(m).padStart(2,'0');
    if(!md[k])md[k]={month:new Date(y,m-1,1),budget:0,paid:0,outstanding:0};
    md[k].budget+=bud;md[k].paid+=pad;md[k].outstanding+=(outstd||0);
  }
  for(var p=0;p<phases.length;p++){if(phases[p].name==='options')continue;
    for(var j=0;j<phases[p].items.length;j++){var item=phases[p].items[j];
      var start=item.startDate,end=item.endDate;
      var amt=item.markup||0;var pvd=item.paid||0;
      if(!end&&!start)continue;
      if(end){
        var ey=end.getFullYear(),em=end.getMonth()+1;
        addToMonth(ey,em,amt,pvd,item.outstanding||0);
      }
    }}
  injectCOs(md,false);
  reconcileScheduleToRevised(md,main);
  var sorted=Object.values(md).sort(function(a,b){return a.month-b.month});
  sorted.forEach(function(d){
    d.isPast=d.month<firstOfThisMonth;
    var ym=d.month.getFullYear()+'-'+String(d.month.getMonth()+1).padStart(2,'0');
    var isThisOrPastMonth=d.month<firstOfNextMonth;
    if(isThisOrPastMonth){
      var histData=(histAmtMap[ym]!=null)?histAmtMap[ym]:null;
      if(histData!=null && histData.amount>0){
        // Invoice history exists: use sent invoice amount
        d.display=histData.amount;
        d.paidAmount=histData.amount;
        d.histStatus=histData.status;
      } else {
        // No invoice history: show outstanding (earned-unpaid) or fall back to scheduled budget
        d.display=(d.outstanding>0?d.outstanding:d.budget)||0;
        d.paidAmount=0;
        d.histStatus=null;
      }
    }else{
      // Future months: follow schedule.
      d.display=d.budget;
      d.paidAmount=0;
      d.histStatus=null;
    }
  });
  el.innerHTML='<div class="sbox"><div class="shdr"><h2>💰 Monthly Draw Schedule</h2><div class="meta">Budget + approved COs by completion month</div></div><div style="padding:20px"><canvas id="drawCanvas" height="420"></canvas></div></div>';

  var canvas=document.getElementById('drawCanvas');
  if(!canvas||!canvas.offsetWidth)return;
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  var W=canvas.offsetWidth,H=420;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';ctx.scale(dpr,dpr);
  if(!sorted.length)return;

  var pad={t:40,r:85,b:65,l:85};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var maxBar=Math.max.apply(null,sorted.map(function(d){return d.display}))||1;
  // Cumulative line represents schedule budget (reconciled to Revised Total)
  var maxCum=Math.max(sorted.reduce(function(s,d){return s+(d.budget||0)},0),1);
  var barW=Math.min(48,cW/sorted.length*.65);
  var gap=(cW-barW*sorted.length)/(sorted.length+1);

  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(42,58,85,.4)';ctx.lineWidth=1;
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='10px sans-serif';
  for(var i=0;i<=5;i++){
    var y=pad.t+cH*(1-i/5);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.textAlign='right';ctx.fillText(fmtK(maxBar*i/5),pad.l-8,y+4);
    ctx.textAlign='left';ctx.fillText(fmtK(maxCum*i/5),W-pad.r+8,y+4);
  }

  var cum=0;var pts=[];
  sorted.forEach(function(d,i){
    var x=pad.l+gap+(barW+gap)*i;
    var bH=(d.display/maxBar)*cH;var y2=pad.t+cH-bH;
    if(d.histStatus==='due'){
      ctx.fillStyle='rgba(239,68,68,.85)';ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(x,y2,barW,bH,3);else ctx.rect(x,y2,barW,bH);
      ctx.fill();
    }else{
      var grad=ctx.createLinearGradient(x,y2,x,y2+bH);
      grad.addColorStop(0,'rgba(59,130,246,.85)');grad.addColorStop(1,'rgba(59,130,246,.5)');
      ctx.fillStyle=grad;ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(x,y2,barW,bH,3);else ctx.rect(x,y2,barW,bH);
      ctx.fill();
      if(d.histStatus==='paid'||d.paidAmount>0){var pH=Math.min((d.paidAmount/maxBar)*cH,bH);ctx.fillStyle='rgba(34,197,94,.7)';ctx.fillRect(x,pad.t+cH-pH,barW,pH)}
    }
    if(bH>25){ctx.fillStyle='white';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(fmtK(d.display),x+barW/2,y2+14)}
    ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(fmtMoShort(d.month),x+barW/2,H-pad.b+14);
    cum+=(d.budget||0);
    pts.push({x:x+barW/2,y:pad.t+cH-(cum/maxCum)*cH});
  });

  if(pts.length>1){
    ctx.strokeStyle='#22c55e';ctx.lineWidth=2.5;ctx.setLineDash([]);ctx.beginPath();
    pts.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)});ctx.stroke();
    pts.forEach(function(p){ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill()});
  }
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('Monthly Budget ($)',W/2,H-4);
  ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='10px sans-serif';ctx.save();ctx.translate(W-8,pad.t+cH/2);ctx.rotate(Math.PI/2);ctx.fillText('Cumulative',0,0);ctx.restore();
}

function renderSchedule(data){
  var main=data.main||data;
  var phases=main.phases||[];
  var totals=data.totals||{};
  var histAmtMap=getHistoryMonthAmountMap();
  var el=document.getElementById('schedBox');
  var months={};
  var now=new Date();
  var firstOfThisMonth=new Date(now.getFullYear(),now.getMonth(),1);
  var firstOfNextMonth=new Date(now.getFullYear(),now.getMonth()+1,1);
  function addItem(k,item,bud,pvd,outstd){
    if(!months[k])months[k]={month:new Date(parseInt(k.split('-')[0],10),parseInt(k.split('-')[1],10)-1,1),total:0,paid:0,outstanding:0,items:[]};
    months[k].total+=bud;months[k].paid+=pvd;months[k].outstanding+=(outstd||0);
    if(pvd>0||bud>0)months[k].items.push({name:item.name,vendor:item.vendor||'',markup:bud,paid:pvd,outstanding:(outstd||0),phase:item.phase});
  }
  for(var p=0;p<phases.length;p++){if(phases[p].name==='options')continue;
    var phase=phases[p];
    for(var j=0;j<phase.items.length;j++){var item=phase.items[j];item.phase=phase.display||phase.name;
      var start=item.startDate,end=item.endDate;
      var amt=item.markup||0;var pvd=item.paid||0;var outstd=item.outstanding||0;
      if(!end&&!start)continue;
      if(end){var k=end.getFullYear()+'-'+String(end.getMonth()+1).padStart(2,'0');addItem(k,item,amt,pvd,outstd);}
    }}
  // CARRYOVER: past-month items with outstanding balance → roll into current month
  var curYm=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  for(var pc=0;pc<phases.length;pc++){if(phases[pc].name==='options')continue;
    var phasec=phases[pc];
    for(var jc=0;jc<phasec.items.length;jc++){var itemc=phasec.items[jc];
      var endc=itemc.endDate||itemc.startDate;if(!endc)continue;
      var kc=endc.getFullYear()+'-'+String(endc.getMonth()+1).padStart(2,'0');
      if(kc<curYm&&(itemc.outstanding||0)>0){
        if(!months[curYm])months[curYm]={month:new Date(now.getFullYear(),now.getMonth(),1),total:0,paid:0,outstanding:0,items:[]};
        months[curYm].total+=itemc.outstanding;
        months[curYm].outstanding+=itemc.outstanding;
        months[curYm].items.push({name:itemc.name+' [carryover]',vendor:itemc.vendor||'',markup:itemc.outstanding,paid:0,outstanding:itemc.outstanding,phase:phasec.display||phasec.name,isCarryover:true});
      }
    }}
  injectCOs(months,true);
  reconcileScheduleToRevised(months,main);
  var sorted=Object.entries(months).sort(function(a,b){return a[0].localeCompare(b[0])});
  sorted.forEach(function(entry){
    var k=entry[0];
    var m=entry[1];
    m.isPast=m.month<firstOfThisMonth;
    var isThisOrPastMonth=m.month<firstOfNextMonth;
    if(isThisOrPastMonth){
      var histData=(histAmtMap[k]!=null)?histAmtMap[k]:null;
      if(histData!=null && histData.amount>0){
        m.paid=histData.amount;m.display=histData.amount;m.isInvoiced=true;m.histStatus=histData.status;
      } else {
        // No invoice history: show outstanding (earned but unpaid)
        var owedAmt=Math.max(0, m.outstanding||0);
        m.paid=owedAmt;m.display=owedAmt;m.isInvoiced=false;m.histStatus=null;
      }
    }else{
      m.paid=0;m.display=m.total;m.isInvoiced=false;
    }
  });
  var cum=0,html='';
  for(var s=0;s<sorted.length;s++){
    var key=sorted[s][0],m=sorted[s][1];
    cum+=m.display;
    var itemsHtml='';
    for(var i=0;i<m.items.length;i++){
      var it=m.items[i];
      var drawnOrOwed='';
      if(it.isCarryover){drawnOrOwed='<span class="draws" style="color:var(--yellow)">⚡ '+fmt(it.outstanding||it.markup)+' owed</span>';}
      else if(it.paid>0){drawnOrOwed='<span class="draws">✓ '+fmt(it.paid)+'</span>';}
      var cls='draw-item'+(it.isCO?' co-item':it.isCarryover?' carryover-item':'');
      var tag=it.isCO?'<span class="co-tag">CO</span>':it.isCarryover?'<span class="co-tag" style="background:rgba(234,179,8,.15);color:var(--yellow)">CARRY</span>':'';
      itemsHtml+='<div class="'+cls+'"><div><span class="name">'+it.name+'</span>'+tag+'<span class="vendor">'+(it.vendor||'')+'</span></div><div><span class="amount">'+fmt(it.markup)+'</span>'+drawnOrOwed+'</div></div>';
    }
    var drawnAmt=m.paid||0;
    var drawnLabel=m.isInvoiced?(m.histStatus==='due'?'due':'drawn'):'owed';
    var noteColor=m.histStatus==='due'?'var(--red)':'var(--green)';
    var paidNote=(m.month<firstOfNextMonth&&drawnAmt>0)?' · <span style="color:'+noteColor+'">'+fmt(drawnAmt)+' '+drawnLabel+'</span>':'';
    var coCount=m.items.filter(function(x){return x.isCO}).length;
    var coNote=coCount>0?' · <span style="color:var(--purple)">'+coCount+' CO'+(coCount>1?'s':'')+'</span>':'';
    var amtLabel='';
    if(m.month<firstOfNextMonth){amtLabel=m.isInvoiced?' (actual)':m.display>0?' (owed)':'';}
    var totalStyle='';
    if(m.month<firstOfNextMonth&&m.display>0){
      totalStyle=(m.histStatus==='due')?'color:var(--red);font-weight:700':'color:var(--green);font-weight:700';
    }
    html+='<div class="draw-month"><div class="draw-month-hdr" onclick="toggleDraw(this)"><h3>'+fmtMo(m.month)+'</h3><div style="display:flex;align-items:center;gap:16px"><span style="font-size:12px;color:var(--dim)">'+m.items.length+' items · Cumul: '+fmtK(cum)+paidNote+coNote+'</span><span class="total" style="'+totalStyle+'">'+fmt(m.display)+amtLabel+'</span><span class="arrow">▼</span></div></div><div class="draw-items">'+itemsHtml+'</div></div>';
  }
  el.innerHTML='<div class="sbox"><div class="shdr"><h2>📑 Draw Schedule by Month</h2><div class="meta">Click to expand · '+sorted.length+' months · Includes approved COs</div></div>'+html+'</div>';
}

function toggleDraw(hdr){hdr.querySelector('.arrow').classList.toggle('open');hdr.nextElementSibling.classList.toggle('open')}

async function doRefresh(){
  document.getElementById('loading').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('error').style.display='none';
  try{await init()}catch(e){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('errorDetail').textContent=e.message}
}
async function init(){
  try{
    var d=await loadProjectData();
    _data={main:d.main,totals:d.totals};
    document.getElementById('loading').style.display='none';document.getElementById('app').style.display='block';
    setTimeout(function(){renderChart(_data);renderSchedule(_data)},50);
  }catch(e){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('errorDetail').textContent=e.message}
}
window.addEventListener('resize',function(){if(_data)renderChart(_data)});
init();
</script>
